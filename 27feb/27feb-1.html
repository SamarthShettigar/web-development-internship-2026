
<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  border:1px solid red;
}

.topleft {
  position: absolute;
  bottom: 8px;
  right: 16px;
  font-size: 20px;
}

img { 
  width: 100%;
  height: auto;
  opacity: 0.8;
}
</style>
</head>
<body>

<h2>Position Text on Image</h2>

<p>Position a text on an image in the top left corner:</p>

<div class="container">
<img src="image1.png" alt="image1" width="500" height="300">
<div class="topleft">Top Left</div>
</div>

</body>
</html>
